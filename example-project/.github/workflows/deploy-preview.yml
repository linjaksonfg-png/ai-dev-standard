# .github/workflows/deploy-preview.yml
# PR 預覽部署模板 — 詳見 cicd-standard.md
#
# 每個 PR 自動部署到 /preview/pr-{N}/，合併後自動清理

name: Deploy Preview on PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: [self-hosted, bus-host]  # 改為你的 runner label
    steps:
      - name: Deploy PR branch to preview path
        id: deploy
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          PREVIEW_ROOT: ${{ vars.PREVIEW_ROOT }}
          PREVIEW_BASE_URL: ${{ vars.PREVIEW_BASE_URL }}
        run: |
          set -euo pipefail
          preview_root="${PREVIEW_ROOT:-/var/www/html/preview}"
          target_dir="${preview_root}/pr-${PR_NUMBER}"
          mkdir -p "${preview_root}"

          if [ -d "${target_dir}/.git" ]; then
            git -C "${target_dir}" fetch --prune origin "${HEAD_REF}"
          else
            rm -rf "${target_dir}"
            git clone "${REPO_URL}" "${target_dir}"
          fi

          git -C "${target_dir}" checkout -B "${HEAD_REF}" "origin/${HEAD_REF}"
          git -C "${target_dir}" reset --hard "${HEAD_SHA}"

          if [ -f "${target_dir}/composer.json" ]; then
            composer install --working-dir="${target_dir}" \
              --no-interaction --prefer-dist --no-progress || true
          fi

          base_url="${PREVIEW_BASE_URL:-http://localhost/preview}"
          echo "preview_url=${base_url}/pr-${PR_NUMBER}/" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- preview-deploy-url -->'
            const body = `${marker}\n✅ Preview 部署完成\n- URL: ${process.env.PREVIEW_URL}\n- Commit: \`${context.payload.pull_request.head.sha.slice(0,7)}\``
            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.paginate(
              github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 }
            )
            const existing = comments.find(c => c.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: [self-hosted, bus-host]  # 改為你的 runner label
    steps:
      - name: Remove preview directory
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_ROOT: ${{ vars.PREVIEW_ROOT }}
        run: rm -rf "${PREVIEW_ROOT:-/var/www/html/preview}/pr-${PR_NUMBER}"

      - name: Comment cleanup
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '<!-- preview-deploy-url -->\n🧹 Preview 已清理（PR 已關閉）'
            })
