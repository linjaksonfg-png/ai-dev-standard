# .github/workflows/sync-ai-standard.yml
# 自動同步 AI 開發標準檔案，建立 PR 供 review
#
# 觸發方式：
#   1. 每週一凌晨 2 點（排程）
#   2. 中央 repo 推播（repository_dispatch）
#   3. 手動觸發（workflow_dispatch）

name: Sync AI Dev Standard

on:
  schedule:
    - cron: '0 2 * * 1'  # 每週一 UTC 02:00
  repository_dispatch:
    types: [ai-standard-updated]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 檢查同步設定
        id: check
        run: |
          if [ ! -f ".ai-dev-standard.json" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ 未啟用 AI 標準同步（找不到 .ai-dev-standard.json）"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 同步 AI 開發標準
        if: steps.check.outputs.skip != 'true'
        run: bash .github/scripts/sync-ai-standard.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 檢查是否有變更
        if: steps.check.outputs.skip != 'true'
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 建立 PR
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="chore/sync-ai-standard-$(date +%Y%m%d)"
          git config user.name "ai-standard-bot"
          git config user.email "bot@noreply.github.com"
          git checkout -b "$BRANCH"
          git add AGENTS.md CLAUDE.md CODEX.md GEMINI.md ANTIGRAVITY.md \
                  skills-development-guide.md skills-memory-standard.md \
                  .github/ISSUE_TEMPLATE/feature.yml \
                  .github/ISSUE_TEMPLATE/bug.yml \
                  .github/PULL_REQUEST_TEMPLATE.md \
                  .ai-dev-standard.json
          git commit -m "chore: sync AI dev standard from central repo"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: 同步 AI 開發標準" \
            --body "$(cat <<'BODY'
          ## Summary
          - 自動同步 AI 開發標準檔案（來源：central repo）
          - 請 review 變更內容後合併

          ## 注意
          - 專案專屬設定在 `*.local.md` 中，不受影響
          - 若不需要此次更新，可直接關閉 PR

          🤖 Generated by sync-ai-standard workflow
          BODY
          )" \
            --base main || echo "PR already exists for this update"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
